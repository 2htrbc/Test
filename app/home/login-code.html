<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>HONOR TV Login</title>
<style>
:root {
  --accent: #00ffd5;
  --accent-dark: #00c0a8;
  --bg-main: #121212;
  --bg-card: #1f1f1f;
  --bg-input: #2a2a2a;
  --text-primary: #ffffff;
  --text-secondary: #cccccc;
  --focus-ring: 0 0 0 3px rgba(0, 255, 213, 0.8), 0 0 25px rgba(0, 255, 213, 0.5);
  --transition: all 0.15s ease-out;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  border: 0;
}

body {
  background: var(--bg-main);
  color: var(--text-primary);
  font-family: Arial, Helvetica, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 40px 20px;
  text-align: center;
  font-size: 18px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.login-box {
  background: var(--bg-card);
  padding: 50px 40px;
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(0, 255, 200, 0.25);
  max-width: 420px;
  width: 100%;
}

h2 {
  color: var(--accent);
  margin-bottom: 35px;
  font-size: 32px;
  font-weight: 700;
  text-shadow: 0 0 12px rgba(0, 255, 213, 0.6);
}

/* TV-optimized focusable elements */
input, button {
  padding: 18px 24px;
  font-size: 22px;
  border-radius: 12px;
  width: 100%;
  outline: none;
  transition: var(--transition);
  cursor: pointer;
}

input {
  border: 3px solid transparent;
  margin-bottom: 30px;
  background: var(--bg-input);
  color: var(--text-primary);
  text-align: center;
  font-weight: 500;
}

/* Focus state for TV remote navigation */
input:focus, button:focus {
  border-color: var(--accent);
  box-shadow: var(--focus-ring);
  transform: scale(1.03);
  z-index: 10;
}

input::placeholder {
  color: var(--text-secondary);
  opacity: 0.7;
}

button {
  border: 3px solid transparent;
  background: linear-gradient(to right, var(--accent), var(--accent-dark));
  color: #000000;
  font-weight: 700;
  min-height: 64px; /* TV touch/remote target size */
}

button:hover, button:active {
  transform: scale(1.02);
  box-shadow: 0 0 20px rgba(0, 255, 213, 0.6);
}

#message {
  margin-top: 30px;
  font-weight: 600;
  font-size: 19px;
  min-height: 30px;
  line-height: 1.4;
}

/* Skip outline for mouse, keep for remote */
:focus-visible {
  outline: none;
}

/* High contrast for better TV visibility */
@media (prefers-contrast: high) {
  :root {
    --accent: #00ffcc;
    --focus-ring: 0 0 0 4px #00ffcc, 0 0 30px #00ffcc;
  }
}
</style>
</head>
<body>
<div class="login-box" role="main">
  <h2>HONOR TV Login</h2>
  <input 
    type="text" 
    id="codeInput" 
    maxlength="30" 
    placeholder="Enter your login code" 
    autofocus
    autocomplete="off"
    inputmode="text"
  />
  <button id="submitBtn" tabindex="0">Login</button>
  <div id="message" aria-live="polite"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {  
  apiKey: "AIzaSyCR1uCuyGSoVcPlmocqPAyZsQeNbiZoZWQ",
  authDomain: "appcode-a1290.firebaseapp.com",
  projectId: "appcode-a1290",
  storageBucket: "appcode-a1290.firebasestorage.app",
  messagingSenderId: "538238847885",
  appId: "1:538238847885:web:b62567a298a9ac91cc8bc4",
  measurementId: "G-2H7L7SF1X6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const input = document.getElementById("codeInput");
const messageEl = document.getElementById("message");
const submitBtn = document.getElementById("submitBtn");
const focusableElements = [input, submitBtn];
let currentFocusIndex = 0;

// All valid durations
const allowedDurations = ["7","15","30","60","180","365","730","lifetime"];

async function validateCode() {
  const code = input.value.trim();
  if (!code || code.length < 4) { 
    showMessage("⚠️ Enter a valid code (min 4 characters)", "#ff6666"); 
    return; 
  }

  try {
    const ref = doc(db, "codes", code);
    const snap = await getDoc(ref);

    if (!snap.exists()) { 
      showMessage("❌ Invalid code.", "#ff6666"); 
      return; 
    }

    const data = snap.data();
    const duration = data.duration;
    const createdAt = data.createdAt?.toDate?.() || new Date();

    if (!allowedDurations.includes(duration)) { 
      showMessage("⚠️ Code has an invalid duration.", "#ffcc00"); 
      return; 
    }

    let expireAt;
    if (duration === "lifetime") { 
      expireAt = "lifetime"; 
    } else { 
      expireAt = createdAt.getTime() + parseInt(duration) * 24 * 60 * 60 * 1000; 
    }

    const now = Date.now();
    if (expireAt !== "lifetime" && now > expireAt) { 
      showMessage("⏰ Code has expired.", "#ff6666"); 
      return; 
    }

    localStorage.setItem("loginCode", code);
    localStorage.setItem("expireAt", expireAt);

    showMessage("✅ Code accepted! Redirecting...", "#00ff99");
    setTimeout(() => window.location.href = "index.html", 1200);

  } catch (err) { 
    console.error("Validation error:", err); 
    showMessage("❌ Error validating code.", "#ff4444"); 
  }
}

function showMessage(msg, color="#00ff99") { 
  messageEl.textContent = msg; 
  messageEl.style.color = color; 
}

// Focus navigation helper
function setFocus(index) {
  if (index < 0) index = focusableElements.length - 1;
  if (index >= focusableElements.length) index = 0;
  currentFocusIndex = index;
  focusableElements[currentFocusIndex].focus();
}

// ✅ FULL TV REMOTE / D-PAD SUPPORT
document.addEventListener("keydown", (e) => {
  const key = e.key || e.keyCode;
  
  // Enter / OK / Select
  if (key === "Enter" || key === " " || key === 13 || key === 32) {
    e.preventDefault();
    if (document.activeElement === submitBtn) {
      validateCode();
    } else if (document.activeElement === input) {
      submitBtn.focus();
    }
    return;
  }

  // D-Pad Up / Previous
  if (key === "ArrowUp" || key === 38) {
    e.preventDefault();
    setFocus(currentFocusIndex - 1);
    return;
  }

  // D-Pad Down / Next
  if (key === "ArrowDown" || key === 40) {
    e.preventDefault();
    setFocus(currentFocusIndex + 1);
    return;
  }

  // D-Pad Left / Right: move cursor inside input, don't change focus
  if (key === "ArrowLeft" || key === "ArrowRight" || key === 37 || key === 39) {
    if (document.activeElement.tagName !== "INPUT") {
      e.preventDefault();
    }
    return;
  }

  // Back / Escape button
  if (key === "Escape" || key === "Back" || key === 27) {
    e.preventDefault();
    input.blur();
    submitBtn.blur();
    return;
  }
});

// Button click support
submitBtn.addEventListener("click", validateCode);

// Auto focus first field on load
window.addEventListener("load", () => {
  setFocus(0);
});
</script>
</body>
</html>
